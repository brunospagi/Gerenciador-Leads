{% extends 'base_portal.html' %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

<div class="container mt-4 mb-5 text-center" style="max-width: 600px;">
    <h3 class="fw-bold mb-4 text-dark">
        <i class="fas fa-brain text-primary"></i> Ponto Inteligente c/ IA
    </h3>
    
    <div id="ai-status" class="alert alert-warning shadow-sm">
        <i class="fas fa-spinner fa-spin"></i> A carregar IA...
    </div>

    {% if not foto_url %}
    <div class="alert alert-danger shadow-sm">
        <strong>Acesso Bloqueado:</strong> Você não possui foto cadastrada.
    </div>
    {% endif %}

    <div class="card shadow-sm rounded-4 border-0"
         {% if not foto_url %}style="opacity:0.5;pointer-events:none;"{% endif %}>
        <div class="card-body p-4">

            {% if foto_url %}
            <img id="refImage"
                 src="{{ foto_url }}"
                 crossorigin="anonymous"
                 style="display:none;">
            {% endif %}

            <div class="position-relative bg-dark rounded-4 overflow-hidden mb-4 shadow-sm"
                 style="height: 350px;">
                
                <video id="videoElement" autoplay playsinline
                       style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1);">
                </video>
            </div>

            <div class="d-grid gap-2">
                <button id="btnEntrada" class="btn btn-success btn-lg" disabled
                        onclick="tirarFoto('entrada','Entrada')">Entrada</button>
                <button id="btnSaida" class="btn btn-danger btn-lg" disabled
                        onclick="tirarFoto('saida','Saída Final')">Saída</button>
            </div>

            <form id="pontoForm" method="POST">
                {% csrf_token %}
                <input type="hidden" name="tipo_batida" id="tipoBatidaInput">
                <input type="hidden" name="foto_base64" id="fotoBase64Input">
            </form>

            <canvas id="canvasElement" style="display:none;"></canvas>
        </div>
    </div>
</div>

<script>
const video = document.getElementById('videoElement');
const canvas = document.getElementById('canvasElement');
const refImage = document.getElementById('refImage');
const statusDiv = document.getElementById('ai-status');

let referenceDescriptor = null;
let piscou = false;
let olhosFechados = false;
let ultimoNarizX = null;
let framesParados = 0;
let liberado = false;

const DISTANCE_THRESHOLD = 0.55;
const EAR_THRESHOLD = 0.20;
const MIN_MOVIMENTO = 3;
const MAX_FRAMES_PARADO = 15;

function distancia(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function calcularEAR(eye) {
    const A = distancia(eye[1], eye[5]);
    const B = distancia(eye[2], eye[4]);
    const C = distancia(eye[0], eye[3]);
    return (A + B) / (2.0 * C);
}

async function iniciarIA() {

    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';

    await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);

    if (refImage) {
        await new Promise(resolve => {
            if (refImage.complete && refImage.naturalWidth !== 0) resolve();
            else refImage.onload = resolve;
        });

        const detection = await faceapi
            .detectSingleFace(refImage, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (detection) referenceDescriptor = detection.descriptor;
    }

    statusDiv.className = 'alert alert-info';
    statusDiv.innerHTML = 'Posicione o rosto e pisque 👁️';

    ligarCamera();
    monitorar();
}

function monitorar() {
    setInterval(async () => {

        if (!referenceDescriptor) return;

        const detection = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (!detection) {
            bloquear();
            statusDiv.innerHTML = 'Nenhum rosto detectado';
            return;
        }

        const distance = faceapi.euclideanDistance(
            referenceDescriptor,
            detection.descriptor
        );

        // Movimento
        const nose = detection.landmarks.getNose()[3];

        if (ultimoNarizX !== null) {
            const diff = Math.abs(nose.x - ultimoNarizX);

            if (diff < MIN_MOVIMENTO) {
                framesParados++;
            } else {
                framesParados = 0;
            }
        }

        ultimoNarizX = nose.x;

        if (framesParados > MAX_FRAMES_PARADO) {
            bloquear();
            statusDiv.innerHTML = 'Movimento insuficiente ❌';
            return;
        }

        // Piscada
        const leftEye = detection.landmarks.getLeftEye();
        const rightEye = detection.landmarks.getRightEye();
        const ear = (calcularEAR(leftEye) + calcularEAR(rightEye)) / 2;

        if (ear < EAR_THRESHOLD) olhosFechados = true;
        if (olhosFechados && ear > EAR_THRESHOLD + 0.05) piscou = true;

        // Validação simples
        if (distance < DISTANCE_THRESHOLD && piscou) {
            liberado = true;
            liberar();
            statusDiv.className = 'alert alert-success';
            statusDiv.innerHTML = 'Identidade confirmada ✅';
        } else {
            bloquear();
        }

    }, 300);
}

function bloquear() {
    btnEntrada.disabled = true;
    btnSaida.disabled = true;
}

function liberar() {
    btnEntrada.disabled = false;
    btnSaida.disabled = false;
}

function ligarCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => video.srcObject = stream)
        .catch(() => alert("Permita acesso à câmera."));
}

function tirarFoto(tipo) {

    if (!liberado) {
        alert("Validação ainda não concluída.");
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    const dataURL = canvas.toDataURL('image/jpeg', 0.8);

    document.getElementById('fotoBase64Input').value = dataURL;
    document.getElementById('tipoBatidaInput').value = tipo;

    pontoForm.submit();
}

iniciarIA();
</script>

{% endblock %}
