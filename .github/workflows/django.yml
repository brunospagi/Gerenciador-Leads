name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    env:
      DB_ENGINE: sqlite
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "False"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Collect static files
      # Mesma etapa que o entrypoint.sh roda em producao. Necessaria porque
      # STORAGES['staticfiles'] usa manifest (WhiteNoise), que exige o manifest
      # gerado por collectstatic para resolver {% static %} nos templates.
      run: |
        python manage.py collectstatic --noinput
    - name: Run Tests
      run: |
        python manage.py test
