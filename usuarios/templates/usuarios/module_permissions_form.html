{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="mb-1"><i class="bi bi-sliders me-2"></i>Permissoes por Modulo</h1>
        <p class="text-muted mb-0">Usuario: <strong>{{ target_user.username }}</strong> ({{ target_user.get_full_name|default:"sem nome" }})</p>
    </div>
    <a href="{% url 'user_module_permissions' %}" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                {% for field in form %}
                <div class="col-md-6 mb-3">
                    <div class="form-check form-switch">
                        {{ field }}
                        <label class="form-check-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>
            <hr>
            <button type="submit" class="btn btn-primary">Salvar permissoes</button>
        </form>
    </div>
</div>
{% endblock %}
