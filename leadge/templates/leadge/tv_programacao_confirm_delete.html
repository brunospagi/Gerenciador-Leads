{% extends 'base.html' %}

{% block title %}Excluir Item da Programação{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white">Confirmar Exclusão</div>
                <div class="card-body text-center">
                    <h5 class="mb-3">Excluir "{{ object.titulo }}" da programação?</h5>
                    <p class="text-muted">Esta ação remove o item da linha do tempo da TV.</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <a href="{% url 'tv_gestao' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Sim, Excluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
